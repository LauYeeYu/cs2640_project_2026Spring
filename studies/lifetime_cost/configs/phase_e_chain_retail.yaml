# Phase E v3 — τ-bench retail multi-customer CHAIN, N=10 customers
# (= 2 chains × chain_size=5) × 4 policies (Haiku, parallel).
#
# Hypothesis test: if customer-service compaction was a no-op at single-
# customer scale (Phase E v2: 0 compactions, max_p ~9K), does it light up
# at multi-customer scale where context naturally grows?
#
# Smoke (chain_size=3, 1 chain, none): 36 steps, max_p 21K, all 3 customers
# resolved. Chain harness verified working. Bumping to chain_size=5 to push
# max_p above the 35K trigger.
#
# Wall budget: 2 chains × 4 policies = 8 trajectories at n_workers=4.
# Each chain ~50-70 steps (5 customers × 10-15 steps avg). Cost ~$0.25-0.50
# per chain → ~$3-5 total run.

models:
  - anthropic/claude-haiku-4-5

summarizer_model: anthropic/claude-haiku-4-5

model_kwargs:
  anthropic/claude-haiku-4-5:
    max_new_tokens: 600
    temperature: 0.5

policies:
  - name: none
  - name: smart_evict
    kwargs: { trigger_ratio: 0.85, target_ratio: 0.55, protect_recent: 3, min_obs_tokens: 300, use_hard_budget_trigger: false, max_drop_score: 0.4, emergency_ratio: 0.95 }
  - name: consumption_evict
    kwargs: { drop_threshold_tokens: 5000, protect_recent: 3, min_obs_tokens: 200, trigger_ratio: 0.85, use_hard_budget_trigger: false, preserve_facts: false, outline_mode: false }
  - name: consumption_evict_outline
    kwargs: { drop_threshold_tokens: 5000, protect_recent: 3, min_obs_tokens: 200, trigger_ratio: 0.85, use_hard_budget_trigger: false, preserve_facts: false, outline_mode: true }

benchmarks:
  - name: taubench
    kwargs:
      domain: retail
      max_tasks: 10
      chain_size: 5
      chain_max_steps_per_customer: 25
      user_model: claude-haiku-4-5
      user_provider: anthropic

budget_tokens: 35000
hard_budget_tokens: 100000
max_tasks: null
n_workers: 4
out_dir: studies/lifetime_cost/out/phase_e_chain_retail
