# Phase E v1 — outline-mode placeholder vs plain vs facts vs none.
#
# Direct follow-up to Phase D v2 mechanism analysis (FINDINGS.md):
#   - plain consumption_evict won (forces re-fetch → keeps agent open to new hypotheses)
#   - consumption_evict_facts lost (anchored agent on flat function-name list)
#   - outline mode is the recommended middle ground: location breadcrumbs
#     (lineN: header) + explicit "re-read with read_file to act" instruction.
#
# Same 10 tasks as Phase D v2 for direct comparability.
# Wall-time budget: ~10 tasks × 4 policies = 40 trajectories at n_workers=4.

models:
  - anthropic/claude-haiku-4-5

summarizer_model: anthropic/claude-haiku-4-5

model_kwargs:
  anthropic/claude-haiku-4-5:
    max_new_tokens: 800
    temperature: 0.5

policies:
  - name: none
  - name: consumption_evict
    kwargs: { drop_threshold_tokens: 5000, protect_recent: 3, min_obs_tokens: 200, trigger_ratio: 0.85, use_hard_budget_trigger: false, preserve_facts: false, outline_mode: false }
  - name: consumption_evict_facts
    kwargs: { drop_threshold_tokens: 5000, protect_recent: 3, min_obs_tokens: 200, trigger_ratio: 0.85, use_hard_budget_trigger: false, preserve_facts: true, outline_mode: false }
  - name: consumption_evict_outline
    kwargs: { drop_threshold_tokens: 5000, protect_recent: 3, min_obs_tokens: 200, trigger_ratio: 0.85, use_hard_budget_trigger: false, preserve_facts: false, outline_mode: true }

benchmarks:
  - name: swebench_live
    kwargs:
      cache_dir: /scratch/swebench_repos
      max_steps_per_task: 80
      instance_ids:
        - psf__requests-2148
        - psf__requests-2317
        - psf__requests-3362
        - pallets__flask-4045
        - pallets__flask-4992
        - pallets__flask-5063
        - pylint-dev__pylint-5859
        - pylint-dev__pylint-7228
        - pytest-dev__pytest-5227
        - pytest-dev__pytest-7490

budget_tokens: 35000
hard_budget_tokens: 100000
max_tasks: null
n_workers: 4
out_dir: studies/lifetime_cost/out/phase_e_outline_10tasks
