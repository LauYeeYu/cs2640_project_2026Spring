# Phase E v4 — τ-bench retail BIG chain (chain_size=10, 1 chain × 4 policies).
#
# Phase E v3 (chain_size=5) showed max_p of 32K — at the 29.75K trigger
# boundary but still 0 comps because not enough "stale" context. This run
# pushes chain_size=10 (~110 steps per chain, max_p estimated 50-60K) to
# definitively test whether compaction fires AND helps when it does.
#
# Wall budget: 1 chain × 4 policies = 4 trajectories at n_workers=4.
# Cost ~$0.40-0.80 per chain → ~$2-3 total.

models:
  - anthropic/claude-haiku-4-5

summarizer_model: anthropic/claude-haiku-4-5

model_kwargs:
  anthropic/claude-haiku-4-5:
    max_new_tokens: 600
    temperature: 0.5

policies:
  - name: none
  - name: smart_evict
    kwargs: { trigger_ratio: 0.85, target_ratio: 0.55, protect_recent: 3, min_obs_tokens: 300, use_hard_budget_trigger: false, max_drop_score: 0.4, emergency_ratio: 0.95 }
  - name: consumption_evict
    kwargs: { drop_threshold_tokens: 5000, protect_recent: 3, min_obs_tokens: 200, trigger_ratio: 0.85, use_hard_budget_trigger: false, preserve_facts: false, outline_mode: false }
  - name: consumption_evict_outline
    kwargs: { drop_threshold_tokens: 5000, protect_recent: 3, min_obs_tokens: 200, trigger_ratio: 0.85, use_hard_budget_trigger: false, preserve_facts: false, outline_mode: true }

benchmarks:
  - name: taubench
    kwargs:
      domain: retail
      max_tasks: 10
      chain_size: 10
      chain_max_steps_per_customer: 25
      user_model: claude-haiku-4-5
      user_provider: anthropic

budget_tokens: 35000
hard_budget_tokens: 100000
max_tasks: null
n_workers: 4
out_dir: studies/lifetime_cost/out/phase_e_chain_retail_big
