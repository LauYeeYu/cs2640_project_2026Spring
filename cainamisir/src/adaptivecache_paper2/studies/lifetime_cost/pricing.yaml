# Per-model price sheet ($ per million tokens).
# All policies are evaluated under each price column; the *ranking* of policies
# should be invariant across columns — that's the falsifiable model-agnostic claim.
#
# Sources: provider pricing pages as of 2026-04. Self-hosted entries use
# amortized GPU $/hour ÷ tokens-per-hour benchmark; see studies/lifetime_cost/METHODS.md.

models:

  anthropic/claude-sonnet-4-6:
    input_uncached: 3.00
    input_cached:   0.30      # 5m TTL pricing
    output:        15.00
    cache_write:    3.75      # 5m TTL write cost
    tokenizer:    "anthropic" # uses anthropic SDK count_tokens

